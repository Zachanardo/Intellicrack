[workspace]
name = "Intellicrack"
version = "0.1.0"
authors = ["Zachary Flint <zach.flint2@gmail.com>"]
description = "Intellicrack: AI-powered reverse engineering orchestration platform"
channels = ["conda-forge"]
platforms = ["win-64"]
preview = ["pixi-build"]

[dependencies]
python = "3.13.*"
git = "*"
pip = "*"
wheel = "*"
setuptools = "*"
just = "*"

[pypi-dependencies]
anthropic = "*"
openai = "*"
google-generativeai = "*"
ollama = "*"
httpx = "*"
PyQt6 = "*"
qdarkstyle = "*"
pygments = "*"
pefile = "*"
lief = "*"
capstone = "*"
keystone-engine = "*"
frida = "*"
r2pipe = "*"
ghidra-bridge = "*"
python-dotenv = "*"
tomli = "*"
tomli-w = "*"
aiofiles = "*"
aiosqlite = "*"
pydantic = "*"
rich = "*"
pytest = "*"
pytest-asyncio = "*"
pytest-cov = "*"

[tasks]
dev = "python -m intellicrack"
gui = "python -m intellicrack.ui.app"
test = "pytest tests/ -v"
lint = "ruff check src/"
format = "ruff format src/"
typecheck = "mypy src/"
